<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2D4A3E" flood-opacity="0.08"/>
    </filter>
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2D4A3E" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F3EC"/>
      <stop offset="100%" style="stop-color:#EDE8DF"/>
    </linearGradient>
    <linearGradient id="greenBar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A7C59"/>
      <stop offset="100%" style="stop-color:#6B9E78"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C97B6A"/>
      <stop offset="100%" style="stop-color:#E0957F"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A85A"/>
      <stop offset="100%" style="stop-color:#E0C27A"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A8A68"/>
      <stop offset="60%" style="stop-color:#C9A85A"/>
      <stop offset="100%" style="stop-color:#C97B6A"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Subtle decorative rings -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#D8D0C4" stroke-width="0.5" opacity="0.5"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#D8D0C4" stroke-width="0.5" opacity="0.3"/>

  <!-- ====== COMMENT CARD 1 (top-left, clean/safe) ====== -->
  <g filter="url(#softShadow)" transform="translate(42, 70)">
    <rect x="0" y="0" width="148" height="68" rx="12" fill="#FDFAF5"/>
    <!-- Avatar dot -->
    <circle cx="20" cy="20" r="10" fill="#A8C5B0"/>
    <text x="20" y="25" font-family="Georgia, serif" font-size="10" fill="#FDFAF5" text-anchor="middle" font-weight="bold">U</text>
    <!-- Text lines -->
    <rect x="38" y="12" width="72" height="6" rx="3" fill="#C8D9CC" opacity="0.8"/>
    <rect x="38" y="23" width="50" height="5" rx="2.5" fill="#D8E4DB" opacity="0.6"/>
    <!-- Toxicity label -->
    <rect x="0" y="46" width="148" height="22" rx="0 0 12 12" fill="#EAF2EC"/>
    <circle cx="14" cy="57" r="4" fill="#4A7C59"/>
    <text x="24" y="61" font-family="Georgia, serif" font-size="8.5" fill="#3A6349" font-weight="600">Safe</text>
    <!-- Score bar background -->
    <rect x="60" y="52" width="72" height="8" rx="4" fill="#D4E8D8"/>
    <!-- Score bar fill (low = good, ~15%) -->
    <rect x="60" y="52" width="11" height="8" rx="4" fill="url(#greenBar1)"/>
    <text x="136" y="60" font-family="Georgia, serif" font-size="8" fill="#4A7C59" font-weight="700" text-anchor="end">8%</text>
  </g>

  <!-- ====== COMMENT CARD 2 (top-right, toxic) ====== -->
  <g filter="url(#softShadow)" transform="translate(212, 55)">
    <rect x="0" y="0" width="148" height="68" rx="12" fill="#FDFAF5"/>
    <!-- Avatar dot -->
    <circle cx="20" cy="20" r="10" fill="#C9A8A0"/>
    <text x="20" y="25" font-family="Georgia, serif" font-size="10" fill="#FDFAF5" text-anchor="middle" font-weight="bold">A</text>
    <!-- Text lines -->
    <rect x="38" y="12" width="88" height="6" rx="3" fill="#D8C8C4" opacity="0.8"/>
    <rect x="38" y="23" width="60" height="5" rx="2.5" fill="#E2D4D0" opacity="0.6"/>
    <!-- Toxicity label -->
    <rect x="0" y="46" width="148" height="22" rx="0 0 12 12" fill="#F8EDEA"/>
    <circle cx="14" cy="57" r="4" fill="#C97B6A"/>
    <text x="24" y="61" font-family="Georgia, serif" font-size="8.5" fill="#A85848" font-weight="600">Toxic</text>
    <!-- Score bar background -->
    <rect x="60" y="52" width="72" height="8" rx="4" fill="#EDD8D4"/>
    <!-- Score bar fill (high ~82%) -->
    <rect x="60" y="52" width="59" height="8" rx="4" fill="url(#redBar)"/>
    <text x="136" y="60" font-family="Georgia, serif" font-size="8" fill="#C97B6A" font-weight="700" text-anchor="end">82%</text>
  </g>

  <!-- ====== COMMENT CARD 3 (bottom-left, warning) ====== -->
  <g filter="url(#softShadow)" transform="translate(55, 262)">
    <rect x="0" y="0" width="148" height="68" rx="12" fill="#FDFAF5"/>
    <!-- Avatar dot -->
    <circle cx="20" cy="20" r="10" fill="#C9BF98"/>
    <text x="20" y="25" font-family="Georgia, serif" font-size="10" fill="#FDFAF5" text-anchor="middle" font-weight="bold">M</text>
    <!-- Text lines -->
    <rect x="38" y="12" width="65" height="6" rx="3" fill="#D4CCAA" opacity="0.8"/>
    <rect x="38" y="23" width="88" height="5" rx="2.5" fill="#DDD8C0" opacity="0.6"/>
    <!-- Toxicity label -->
    <rect x="0" y="46" width="148" height="22" rx="0 0 12 12" fill="#F8F3E4"/>
    <circle cx="14" cy="57" r="4" fill="#C9A85A"/>
    <text x="24" y="61" font-family="Georgia, serif" font-size="8.5" fill="#9A7A30" font-weight="600">Warning</text>
    <!-- Score bar background -->
    <rect x="72" y="52" width="60" height="8" rx="4" fill="#EDE5C8"/>
    <!-- Score bar fill (~47%) -->
    <rect x="72" y="52" width="28" height="8" rx="4" fill="url(#amberBar)"/>
    <text x="136" y="60" font-family="Georgia, serif" font-size="8" fill="#C9A85A" font-weight="700" text-anchor="end">47%</text>
  </g>

  <!-- ====== CENTER GAUGE / DONUT CHART ====== -->
  <g transform="translate(200, 210)">
    <!-- Outer ring background -->
    <circle cx="0" cy="0" r="56" fill="none" stroke="#DDD8CE" stroke-width="9"/>
    <!-- Gauge arc: 270° sweep from -225° to 45° (representing overall toxicity score) -->
    <!-- Using stroke-dasharray for arc. circumference = 2*pi*56 ≈ 351.9 -->
    <!-- 270/360 * 351.9 ≈ 264 for full gauge span -->
    <!-- Fill ~38% of the gauge = 264 * 0.38 ≈ 100 -->
    <circle cx="0" cy="0" r="56" fill="none"
      stroke="url(#gaugeGrad)"
      stroke-width="9"
      stroke-dasharray="100 252"
      stroke-dashoffset="-88"
      stroke-linecap="round"
      opacity="0.9"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="43" fill="#F5F0E8"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="#EDE8DF" stroke-width="1"/>

    <!-- Center text -->
    <text x="0" y="-8" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#2D4A3E" text-anchor="middle">38%</text>
    <text x="0" y="10" font-family="Georgia, serif" font-size="8" fill="#7A9585" text-anchor="middle" letter-spacing="1.5">TOXICITY</text>
    <text x="0" y="22" font-family="Georgia, serif" font-size="8" fill="#7A9585" text-anchor="middle" letter-spacing="1.5">SCORE</text>

    <!-- Needle dot -->
    <circle cx="0" cy="0" r="4" fill="#2D4A3E"/>
  </g>

  <!-- ====== STAT PILL - comments analyzed ====== -->
  <g filter="url(#subtleShadow)" transform="translate(138, 313)">
    <rect x="0" y="0" width="124" height="34" rx="17" fill="#2D4A3E"/>
    <text x="62" y="13" font-family="Georgia, serif" font-size="8" fill="#8FBC9A" text-anchor="middle" letter-spacing="1">ANALYZED</text>
    <text x="62" y="27" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#F5F0E8" text-anchor="middle">2,000 comments</text>
  </g>

  <!-- ====== CATEGORY DOTS (bottom) ====== -->
  <g transform="translate(200, 370)">
    <circle cx="-60" cy="0" r="5" fill="#4A7C59"/>
    <circle cx="-30" cy="0" r="5" fill="#C97B6A"/>
    <circle cx="0" cy="0" r="5" fill="#C9A85A"/>
    <circle cx="30" cy="0" r="5" fill="#7A9AC5"/>
    <circle cx="60" cy="0" r="5" fill="#A87AC9"/>
    <circle cx="90" cy="0" r="5" fill="#C9A87A"/>
  </g>

  <!-- Subtle vignette overlay -->
  <circle cx="200" cy="200" r="200" fill="none" stroke="#EDE8DF" stroke-width="2"/>
</svg>
